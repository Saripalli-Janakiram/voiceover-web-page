<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Read Aloud Lite</title>
  <style>
    body { font-family: Arial, sans-serif; width: 260px; padding: 10px; }
    label { display: block; margin-top: 8px; font-size: 13px; }
    select, input[type=range] { width: 100%; }
    button { margin-top: 8px; width: 100%; padding: 6px; }
  </style>
</head>
<body>
  <h3>Read Aloud Lite</h3>

  <label>Voice:
    <select id="voiceSelect"></select>
  </label>

  <label>Rate:
    <input id="rate" type="range" min="0.5" max="2" step="0.1" value="1">
  </label>

  <label>Pitch:
    <input id="pitch" type="range" min="0.5" max="2" step="0.1" value="1">
  </label>

  <button id="readBtn">▶ Read Page / Selection</button>
  <button id="pauseBtn">⏸ Pause</button>
  <button id="resumeBtn">▶ Resume</button>
  <button id="stopBtn">⏹ Stop</button>

  <script src="popup.js"></script>
</body>
</html>
